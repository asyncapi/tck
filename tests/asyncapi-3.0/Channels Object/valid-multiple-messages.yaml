asyncapi: 3.0.0

info:
  title: Channel Test
  version: 1.0.0

channels:
  user/signup:
    address: user/signup
    messages:
      UserSignedUp:
        $ref: '#/components/messages/UserSignedUp'
      UserUpdated:
        $ref: '#/components/messages/UserUpdated'

components:
  messages:
    UserSignedUp:
      payload:
        type: object
        properties:
          userId:
            type: string
    UserUpdated:
      payload:
        type: object
        properties:
          userId:
            type: string
          updatedAt:
            type: string
