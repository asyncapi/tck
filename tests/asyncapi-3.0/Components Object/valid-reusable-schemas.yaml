asyncapi: 3.0.0

info:
  title: Components Test
  version: 1.0.0

channels:
  user/signup:
    address: user/signup
    messages:
      UserSignedUp:
        $ref: '#/components/messages/UserSignedUp'

components:
  schemas:
    User:
      type: object
      required:
        - userId
        - email
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
  
  messages:
    UserSignedUp:
      payload:
        $ref: '#/components/schemas/User'
