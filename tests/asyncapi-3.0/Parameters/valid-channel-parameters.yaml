asyncapi: 3.0.0

info:
  title: Parameters Test
  version: 1.0.0

channels:
  user/{userId}/events:
    address: user/{userId}/events
    parameters:
      userId:
        description: User identifier
        # In v3, parameters don't have 'schema', they have direct properties
        location: $message.payload#/userId
    messages:
      UserEvent:
        payload:
          type: object
          properties:
            userId:
              type: string
              pattern: '^[a-zA-Z0-9]+$'
            eventType:
              type: string
